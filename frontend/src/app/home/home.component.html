<div class="page-wrapper">
  <header class="app-header">
    <span class="logo-text">ytConverter</span>
  </header>

  <main>
    <div class="card">
      <div class="url-input">
        <input
          type="url"
          [formControl]="url"
          placeholder="Paste a YouTube URL…"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="params">
        <div class="selector">
          <h1
            class="format"
            *ngFor="let format of availableFormats"
            (click)="formatSelected = format"
            [ngClass]="{
              'format-active': format == formatSelected,
              'format-deactive': format != formatSelected
            }"
          >
            {{ format.toUpperCase() }}
          </h1>
        </div>

        <div class="selector">
          <h2
            class="quality"
            *ngFor="let quality of availableQualities"
            (click)="qualitySelected = quality"
            [ngClass]="{
              'quality-active': quality == qualitySelected,
              'quality-deactive': quality != qualitySelected,
              'quality-unavailable': formatSelected == 'wav'
            }"
          >
            {{ quality.toUpperCase() }}
          </h2>
        </div>
      </div>

      <div class="action">
        <button
          *ngIf="!isLoading()"
          (click)="convert()"
          class="convert_button"
          [disabled]="!url.value"
        >
          convert
        </button>
        <span *ngIf="isLoading()" class="loader">
          <span class="loader1"></span>
        </span>
      </div>
    </div>

    <div class="messages">
      <p class="error-msg" *ngIf="error()">{{ error() }}</p>
    </div>
  </main>

  <footer>
    <a href="https://thiagoqua.ar" target="_blank">Thiago Quaglia</a>
    <p>Todos los derechos reservados</p>
  </footer>
</div>
